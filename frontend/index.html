<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTrack — Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=21" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- APP SHELL -->
  <div id="app">
    <!-- SIDEBAR (hidden on login) -->
    <aside id="sidebar" class="sidebar hidden">
      <div class="sidebar-brand">
        <div class="brand-icon">🎓</div>
        <span class="brand-name" id="brand-name-header">EduTrack</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="#dashboard" onclick="navigate('dashboard')"><span class="nav-icon">📊</span>
          Dashboard</a>
        <a class="nav-item" href="#students" onclick="navigate('students')"><span class="nav-icon">👥</span>
          Students</a>
        <a class="nav-item" href="#register" onclick="navigate('register')"><span class="nav-icon">➕</span> Register
          Student</a>
        <a class="nav-item" href="#subjects" onclick="navigate('subjects')"><span class="nav-icon">📚</span>
          Subjects</a>
        <a class="nav-item" href="#attendance" onclick="navigate('attendance')"><span class="nav-icon">📅</span>
          Attendance</a>
        <a class="nav-item admin-only" href="#staff" onclick="navigate('staff')"><span class="nav-icon">🛡️</span>
          Staff Management</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">
          <div id="admin-name" style="font-weight:600;font-size:14px;color:white">Administrator</div>
          <div style="display:flex; gap:6px; align-items:center">
            <div class="admin-role" style="font-size:10px;background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;text-transform:uppercase">Admin</div>
            <div id="school-code-display" style="font-size:10px;color:var(--text-muted);font-family:monospace"></div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="main-content full-width">
      <!-- DYNAMIC TOP HEADER -->
      <header id="top-header" class="top-header hidden">
        <div class="header-container">
          <h2 id="school-name-display" class="school-name-display">EduTrack Portal</h2>
        </div>
      </header>
      <div id="page-container"></div>
    </main>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast hidden"></div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="api.js?v=21"></script>
  <script src="pages.js?v=21"></script>
  <script src="app.js?v=21"></script>
</body>

</html>
