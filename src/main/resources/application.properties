spring.application.name=SecureStudentRecordAndDocumentManagementSystem

# ==========================================
# DATABASE CONFIGURATION (MySQL 8)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=radhe$108
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=uploads
file.allowed.types=application/pdf,image/jpeg,image/png,image/jpg

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=SmartStudentSecureSecretKey2024!!MyKeyForJWT
jwt.expiration=86400000

# ==========================================
# LOGGING
# ==========================================
logging.level.com.smartstudent=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# SERVER
# ==========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always