spring.application.name=SecureStudentRecordAndDocumentManagementSystem

# ==========================================
# DATABASE CONFIGURATION (MySQL 8)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:radhe$108}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.allowed.types=application/pdf,image/jpeg,image/png,image/jpg

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=SmartStudentSecureSecretKey2024!!MyKeyForJWT
jwt.expiration=86400000

# ==========================================
# LOGGING
# ==========================================
logging.level.com.smartstudent=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# SERVER
# ==========================================
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Limit threads to save memory
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100

# Aggressive memory saving: don't load beans until needed
spring.main.lazy-initialization=true

# ==========================================
# ENCRYPTION KEYS (AES-256 requires 32-byte Base64 encoded keys)
# Default keys provided for development. Override with environment variables in prod.
# ==========================================
app.security.db-key=${DB_ENCRYPTION_KEY:1234567890123456789012345678901234567890123=}
app.security.file-key=${FILE_ENCRYPTION_KEY:0987654321098765432109876543210987654321098=}